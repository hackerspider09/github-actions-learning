name: Strategy Matrix Workflow

on:
  workflow_dispatch:

  pull_request:
      branches:
        - main
      types:
        - opened
        - updated

jobs:
  matrix-test:
  # This is to test matrix strategy and it will run for all python versions mentioned in matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]

    steps:
      - name: debug line
        run: echo "this will run for all python versions"
      - name: check python version
        run: echo "running python version => ${{matrix.python-version}}"
      
  exclude-test:
  # This is to test exclude in matrix strategy and it will run for all python versions except 3.9 and node version 2.0
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]
        node-version: [1.0, 2.0]
        exclude:
          - python-version: 3.9
          - node-version: 2.0

    steps:
      - name: check python version
        run: echo "python version => ${{matrix.python-version}} and node version => ${{matrix.node-version}}"

  fail-fast-noerror-test:
  # This is to test fail-fast in matrix strategy and it will run for all python versions and node versions but if any of the job fails then it will stop the execution of other jobs in matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]
        node-version: [1.0, 2.0]
      fail-fast: true

    steps:
      - name: check python version
        run: echo "python version => ${{matrix.python-version}} and node version => ${{matrix.node-version}}"
  
  fail-fast-witherror-test:
  # This is to test fail-fast in matrix strategy and it will run for all python versions and node versions but if any of the job fails then it will stop the execution of other jobs in matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10]
        node-version: [1.0, 2.0]
      fail-fast: true

    steps:
      - name: check python version
        run: |
          if [[ ${{matrix.python-version}} == '3.9' ]]; then
            echo "This is python 3.9 and it will fail the job"
            exit 1
          else
            echo "python version => ${{matrix.python-version}} and node version => ${{matrix.node-version}}"
          fi


