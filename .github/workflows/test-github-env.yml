name: test GITHUB_ENV

on:
  workflow_dispatch

jobs:
  github-env:
    runs-on: ubuntu-latest
    env:
      VERSION: 1.0
    steps:
      - name: print env
        run: echo "version from env: $VERSION"

      - name: create variable
        run: echo "VERSION=1.1" >> $GITHUB_ENV

      - name: print all env
        run: env | grep "VERSION"

      - name: print env after change
        run: echo "$VERSION"
